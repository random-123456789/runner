name: Hive-Queen

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write   # needed to update config.json

jobs:
  # -------------------------------------------------------------------
  # Queen Job – orchestrates everything
  # -------------------------------------------------------------------
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl

      - name: Wait for all workers to register
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          echo "👑 Queen waiting for 19 workers to register..."

          # Poll config.json until 19 workers appear
          for i in {1..60}; do
            curl -s -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${REPO_OWNER}/chat/contents/config.json" \
              > /tmp/config.json

            WORKER_COUNT=$(jq '.workers | length' /tmp/config.json 2>/dev/null || echo 0)
            echo "  Attempt $i: $WORKER_COUNT workers registered"

            if [ "$WORKER_COUNT" -ge 19 ]; then
              echo "✅ All workers registered!"
              break
            fi
            sleep 10
          done

          if [ "$WORKER_COUNT" -lt 19 ]; then
            echo "❌ Timeout waiting for workers"
            exit 1
          fi

          # Build RPC connection string
          RPC_ADDRS=$(jq -r '.workers | join(",")' /tmp/config.json)
          echo "RPC_ADDRS=$RPC_ADDRS" >> $GITHUB_ENV

      - name: Download llama.cpp
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggerganov/llama.cpp/archive/refs/heads/master.zip
          unzip -j llama.cpp.zip "llama.cpp-master/build/bin/llama-cli" -d .
          chmod +x llama-cli

      - name: Download model
        run: |
          curl -Lo model.gguf https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF/resolve/main/granite-4.0-h-tiny-distill-opus-4.5-think-q4_k_m.gguf

      - name: Run distributed inference
        run: |
          echo "🧠 Starting distributed inference with workers: ${RPC_ADDRS}"
          ./llama-cli -m model.gguf \
            --rpc ${RPC_ADDRS} \
            --tensor-split 19 \
            -p "What is the meaning of life?" \
            -n 256

      - name: Start Cloudflare tunnel for Queen (optional – expose API)
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          # If you want to expose a frontend, start an HTTP server
          # and tunnel it. Here we just keep the runner alive.
          echo "👑 Queen finished inference – keeping alive for 6 hours."
          sleep infinity

  # -------------------------------------------------------------------
  # Worker Jobs – 19 instances, each runs an RPC server + bore tunnel
  # -------------------------------------------------------------------
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        instance: [1, 2, 3, 4, 5]

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl

      - name: Install bore
        run: |
          curl -Lo bore https://github.com/ekzhang/bore/releases/latest/download/bore-linux-amd64
          chmod +x bore
          sudo mv bore /usr/local/bin/

      - name: Download llama.cpp RPC server
        run: |
          curl -Lo llama.cpp.zip https://github.com/ggerganov/llama.cpp/archive/refs/heads/master.zip
          unzip -j llama.cpp.zip "llama.cpp-master/build/bin/llama-rpc-server" -d .
          chmod +x llama-rpc-server

      - name: Start llama.cpp RPC server and create bore tunnel
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          INSTANCE_ID: ${{ matrix.instance }}
        run: |
          echo "🐝 Worker $INSTANCE_ID starting..."

          # Start llama.cpp RPC server on a unique port (based on instance)
          PORT=$((65430 + INSTANCE_ID))
          ./llama-rpc-server --port ${PORT} &

          # Wait for the server to start
          sleep 5

          # Create bore tunnel
          bore local ${PORT} --to bore.pub > /tmp/bore_url.txt 2>&1 &
          sleep 5

          # Extract the public URL (e.g., bore.pub:12345)
          BORE_URL=$(grep -oP 'bore\.pub:\d+' /tmp/bore_url.txt | head -1)
          if [ -z "$BORE_URL" ]; then
            echo "❌ Failed to get bore URL"
            cat /tmp/bore_url.txt
            exit 1
          fi
          echo "✅ Worker $INSTANCE_ID registered at: ${BORE_URL}"

          # ---- Register this worker in config.json ----
          # Fetch current config
          curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${REPO_OWNER}/chat/contents/config.json" \
            > /tmp/current.json

          # Append the new URL
          jq --arg url "$BORE_URL" '.workers = (.workers // []) + [$url]' \
            /tmp/current.json > /tmp/updated.json

          # Encode and upload back to GitHub
          CONTENT=$(base64 -w0 /tmp/updated.json)
          SHA=$(jq -r '.sha' /tmp/current.json)

          curl -s -X PUT -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_OWNER}/chat/contents/config.json" \
            -d "{\"message\":\"register worker $INSTANCE_ID\",\"content\":\"${CONTENT}\",\"sha\":\"${SHA}\"}"

          echo "✅ Worker $INSTANCE_ID registered successfully!"

          # ---- Keep the worker alive ----
          echo "🐝 Worker $INSTANCE_ID keeping tunnel and RPC server alive..."
          while true; do
            # Check if RPC server is still running
            if ! pgrep -f "llama-rpc-server" > /dev/null; then
              echo "⚠️ RPC server died, restarting..."
              ./llama-rpc-server --port ${PORT} &
            fi
            # Check if bore tunnel is still running
            if ! pgrep -f "bore" > /dev/null; then
              echo "⚠️ Bore tunnel died, restarting..."
              bore local ${PORT} --to bore.pub &
            fi
            sleep 30
          done
