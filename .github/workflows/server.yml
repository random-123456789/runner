name: Queen Orchestrator
on:
  workflow_dispatch:
permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  DOCKER_PORT: 8000

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-mins: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip python3-venv netcat-openbsd
          
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Setup Ollama Engine (Native for Speed)
        uses: ai-action/setup-ollama@v2

      - name: Pull Ollama Model Weights (Native)
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      - name: Verify Ollama is Ready
        run: |
          echo "⏳ Waiting for Ollama API..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 11434; then
              echo "✅ Ollama is online!"
              break
            fi
            sleep 2
          done

      # Write the docker-compose file that runs the unified gateway
      - name: Write Docker Compose File
        run: |
          mkdir -p ~/.hermes
          
          # NOTE: We use host.docker.internal:11434 so the container can find 
          # the natively running Ollama outside the container!
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://host.docker.internal:11434"
          EOF
          
          cat << 'EOF' > docker-compose.yml
          version: '3.8'
          services:
            hermes:
              image: python:3.12-slim
              working_dir: /app
              # Install Hermes and start the unified backend/frontend gateway
              command: sh -c "pip install -q 'hermes-agent[web,pty]' && hermes serve --host 0.0.0.0 --port 8000"
              environment:
                HERMES_ALLOWED_ORIGINS: "*"
                HERMES_ALLOWED_HOSTS: "*"
                HERMES_DISABLE_CSRF: "true"
                HERMES_INSECURE: "true"
              ports:
                - "${{ env.DOCKER_PORT }}:8000"
              volumes:
                - ~/.hermes:/root/.hermes
              # Crucial: Allows the container to resolve the host machine's Ollama
              extra_hosts:
                - "host.docker.internal:host-gateway"
          EOF

      # Start the Docker container in the background
      - name: Start Hermes Unified Gateway via Docker
        run: |
          docker compose up -d --build
          
          echo "⏳ Waiting for Docker container to bind to port ${{ env.DOCKER_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.DOCKER_PORT }}; then
              echo "✅ Docker Gateway is online!"
              break
            fi
            sleep 3
          done

      # Point tunnel directly to the unified Docker port
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          # NO --http-host-header hack needed here! Docker handles host networking cleanly.
          nohup ./cloudflared tunnel \
            --url http://127.0.0.1:${{ env.DOCKER_PORT }} > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z00-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done
          sleep 5

      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          sleep infinity
