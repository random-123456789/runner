# p2p-layer-mesh.yaml
# ============================================================================
# P2P Layer Mesh - Distributed LLM Inference over Peer-to-Peer Network
# ============================================================================

version: "1.0"
metadata:
  name: "p2p-layer-mesh"
  description: "Decentralized LLM inference with layer-aware sharding and proximity routing"

# ----------------------------------------------------------------------------
# Model Definition
# ----------------------------------------------------------------------------
model:
  source: "https://huggingface.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF"
  file: "granite-4.0-h-tiny-distill-opus-4.5-think-q4_k_m.gguf"
  total_layers: 40               # Total layers in the model
  context_length: 4096

# ----------------------------------------------------------------------------
# Layer Sharding Strategy
# ----------------------------------------------------------------------------
sharding:
  strategy: "contiguous"         # Each node gets a contiguous block of layers
  # Alternative: "interleaved"   # Layers are distributed round-robin
  # Alternative: "dynamic"       # Layers are allocated based on node capacity

# ----------------------------------------------------------------------------
# Network Topology
# ----------------------------------------------------------------------------
network:
  protocol: "libp2p"              # Peer-to-peer networking stack
  discovery: "mdns"               # Local network discovery (mdns / bootstrap)
  bootstrap_peers:                # Optional: static bootstrap nodes
    - "/ip4/192.168.1.100/tcp/9001/p2p/Qm..."
    - "/ip4/192.168.1.101/tcp/9001/p2p/Qm..."
  nat_traversal: true             # Enable NAT traversal (hole punching)
  relay: true                     # Use relay nodes when direct connection fails

# ----------------------------------------------------------------------------
# Routing & Scheduling
# ----------------------------------------------------------------------------
routing:
  # Each node maintains a DHT with peer latency and layer range
  discovery_interval: 30          # Seconds between DHT refresh
  latency_threshold: 50           # Maximum acceptable RTT in milliseconds
  fallback_strategy: "random"     # If preferred peer unavailable

# ----------------------------------------------------------------------------
# Nodes (Peer List)
# ----------------------------------------------------------------------------
nodes:
  # Each node is defined by its layer range and connection details
  - id: "node-1"
    role: "worker"
    layers: [0, 9]                # Layers 0 through 9
    listen_addr: "/ip4/0.0.0.0/tcp/9001"
    resources:
      cpu: 4
      memory_gb: 16
    # Optional: hardware capabilities
    accelerator: "cpu"            # "cpu" | "cuda" | "metal"

  - id: "node-2"
    role: "worker"
    layers: [10, 19]
    listen_addr: "/ip4/0.0.0.0/tcp/9002"
    resources:
      cpu: 4
      memory_gb: 16
    accelerator: "cpu"

  - id: "node-3"
    role: "worker"
    layers: [20, 29]
    listen_addr: "/ip4/0.0.0.0/tcp/9003"
    resources:
      cpu: 4
      memory_gb: 16
    accelerator: "cpu"

  - id: "node-4"
    role: "worker"
    layers: [30, 39]
    listen_addr: "/ip4/0.0.0.0/tcp/9004"
    resources:
      cpu: 4
      memory_gb: 16
    accelerator: "cpu"

# ----------------------------------------------------------------------------
# Runtime Parameters
# ----------------------------------------------------------------------------
runtime:
  inference:
    max_tokens: 256
    temperature: 0.7
    top_p: 0.9
    stream: true

  health:
    check_interval: 10            # Seconds between health checks
    timeout: 30                   # Seconds before marking a peer as dead

  logging:
    level: "info"                 # debug | info | warn | error
    format: "json"

# ----------------------------------------------------------------------------
# Security
# ----------------------------------------------------------------------------
security:
  encryption: "tls"               # Transport encryption
  authentication: "peer-id"       # Each node is identified by its libp2p PeerID
  # Optional: require a shared secret for joining the mesh
  # shared_secret: "your-secret-key"

# ----------------------------------------------------------------------------
# Monitoring (Optional)
# ----------------------------------------------------------------------------
monitoring:
  prometheus:
    enabled: true
    port: 9090
  metrics:
    - "inference_latency_ms"
    - "tokens_per_second"
    - "layer_transfer_bytes"
