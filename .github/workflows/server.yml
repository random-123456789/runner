name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  PROXY_PORT: 19000

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Pull core engine applications and runtime frameworks
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git python3-pip netcat-openbsd
          pip install websockets
          
          # Fetch cloudflared binary directly
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama Server Environment
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Cache and provision model weight structures
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Spin up the underlying Python Header Stripper Proxy
      - name: Start Python CORS Handshake Proxy
        run: |
          python3 scripts/cors_proxy.py &
          sleep 2

      # 5. Spin up Open WebUI container mapped directly to host ports
      - name: Deploy Open WebUI Panel
        run: |
          docker run -d -p 3000:8080 \
            --add-host=host.docker.internal:host-gateway \
            -v open-webui:/app/backend/data \
            --name open-webui \
            --restart always \
            ghcr.io/open-webui/open-webui:main
          
          echo "⏳ Waiting for Web UI container space to wake up..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:3000 > /dev/null; then
              echo "✅ Interface Dashboard fully online and bound!"
              break
            fi
            sleep 3
          done

      # 6. Establish secure edge connection over Cloudflare
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.PROXY_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 7. Print stable entry point and preserve runtime threads
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 INTERACTIVE WORKSPACE INTERFACE PORTAL READY:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- CONTAINER RUNTIME STATUS ---"
          docker ps || true
          echo "================================================================="
          sleep infinity
