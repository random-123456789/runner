name: Server

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # --- Checkout backend ---
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/backend
          token: ${{ secrets.TOKEN }}
          path: backend

      # --- Restore caches ---
      - uses: actions/cache@v4
        id: binary
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}
          restore-keys: rust-binary-${{ runner.os }}-

      - uses: actions/cache@v4
        id: ollama
        with:
          path: ~/.ollama/models
          key: ollama-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}-granite4
          restore-keys: ollama-

      - uses: actions/cache@v4
        id: cloudflared
        with:
          path: ./cloudflared
          key: cloudflared-${{ runner.os }}

      # --- Rust setup + build (if cache miss) ---
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build binary
        if: steps.binary.outputs.cache-hit != 'true'
        run: |
          cd backend
          cargo build --release
          cp target/release/unified-api ../
          # Move knowledge folder to root (if it exists)
          if [ -d knowledge ]; then
            cp -r knowledge ../knowledge
          fi
          cd ..
          rm -rf backend

      - name: Save binary
        if: steps.binary.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}

      # --- Ollama ---
      - uses: ai-action/setup-ollama@v2
      - run: |
          ollama pull ibm/granite4:3b-h
          ollama pull qwen3-embedding:0.6b

      - name: Save ollama
        uses: actions/cache/save@v4
        with:
          path: ~/.ollama/models
          key: ollama-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}-granite4

      # --- Cloudflared ---
      - name: Download cloudflared
        if: steps.cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Save cloudflared
        if: steps.cloudflared.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./cloudflared
          key: cloudflared-${{ runner.os }}

      # --- Main service (starts server, tunnel, config update, and self‑replicates) ---
      - name: Run & replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          # The binary and knowledge folder are now in the root.
          chmod +x ./unified-api
          pkill -f unified-api 2>/dev/null || true
          ./unified-api &

          # Wait for health
          for i in {1..10}; do
            curl -s http://localhost:8000/health | grep -q '"status":"ok"' && break
            sleep 2
          done
          curl -s --fail http://localhost:8000/health | grep -q '"status":"ok"' || exit 1

          # Start tunnel
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ./cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee tunnel.log &

          # Extract tunnel URL
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # Update config.js
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG="const API_URL = \"${TUNNEL_URL}\";"
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.js")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"update API URL\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"add API URL\",\"content\":\"${ENCODED}\"}"
          fi
          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # Self‑replication loop
          START_TIME=$(date +%s)
          TRIGGER_AT=$(( 350 * 60 ))
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "Triggering replacement..."
              curl -X POST \
                -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks
            if ! curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server down – restarting..."
              pkill -f unified-api 2>/dev/null || true
              ./unified-api &
            fi
            if ! pgrep -f cloudflared > /dev/null; then
              echo "Tunnel down – restarting..."
              ./cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee -a tunnel.log &
            fi

            sleep 30
          done
