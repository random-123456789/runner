name: Queen (Hermes + Ollama) via SSH

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_PORT: 18789

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install tmate ----------
      - name: Install tmate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmate
          # Alternatively, download latest release:
          # curl -L -o tmate.tar.gz https://github.com/tmate-io/tmate/releases/latest/download/tmate-linux-amd64.tar.gz
          # tar -xzf tmate.tar.gz
          # sudo mv tmate-linux-amd64/tmate /usr/local/bin/

      # ---------- Create Hermes config ----------
      - name: Configure Hermes
        run: |
          mkdir -p ~/.hermes
          cat > ~/.hermes/config.yaml << EOF
          model:
            provider: ollama
            model: ${{ env.OLLAMA_MODEL }}
            baseUrl: http://localhost:11434
          gateway:
            port: ${{ env.HERMES_PORT }}
            host: 0.0.0.0
          EOF
          # Auth credentials
          PASSWORD=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          SECRET=$(openssl rand -base64 32)
          cat > ~/.hermes/.env << EOF
          HERMES_DASHBOARD_BASIC_AUTH_USERNAME=admin
          HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=$PASSWORD
          HERMES_DASHBOARD_BASIC_AUTH_SECRET=$SECRET
          EOF
          echo "ADMIN_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- Start Hermes Dashboard ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          set -a; source ~/.hermes/.env; set +a
          hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_PORT }} --no-open &
          sleep 15
          for i in {1..20}; do
            if curl -s http://localhost:${{ env.HERMES_PORT }}/api/status > /dev/null; then
              echo "✅ Dashboard ready"
              break
            fi
            sleep 2
          done

      # ---------- Start tmate (SSH) ----------
      - name: Start tmate
        id: tmate
        run: |
          # Start tmate in the background and capture the connection string
          tmate -F > /tmp/tmate_output.log 2>&1 &
          # Wait for the SSH connection string to appear
          for i in {1..30}; do
            if grep -q "ssh session:" /tmp/tmate_output.log; then
              SSH_STRING=$(grep "ssh session:" /tmp/tmate_output.log | head -1)
              echo "SSH_STRING=$SSH_STRING" >> $GITHUB_OUTPUT
              break
            fi
            sleep 2
          done
          cat /tmp/tmate_output.log

      # ---------- Print instructions ----------
      - name: Print access
        env:
          SSH_STRING: ${{ steps.tmate.outputs.SSH_STRING }}
        run: |
          echo "================================================================="
          echo "🔑 SSH into the runner using:"
          echo "   $SSH_STRING"
          echo ""
          echo "🌐 Once connected, forward the dashboard port to your local machine:"
          echo "   ssh -L 18789:localhost:${{ env.HERMES_PORT }} ..."
          echo ""
          echo "🔐 Dashboard credentials:"
          echo "   Username: admin"
          echo "   Password: ${{ env.ADMIN_PASSWORD }}"
          echo ""
          echo "💡 Then open http://localhost:18789 in your browser."
          echo "================================================================="
          sleep infinity
