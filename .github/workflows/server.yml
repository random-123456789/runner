name: Server

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to commit .server_start

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # --- Check out the RUNNER repo (this is where the workflow lives) ---
      - name: Checkout runner repo
        uses: actions/checkout@v4
        with:
          # The default is the current repo – no repository parameter needed
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- Check out the BACKEND repo into a subdirectory ---
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/backend
          token: ${{ secrets.TOKEN }}          # use your PAT
          path: backend

      # --- Caches (they now look for files inside backend/) ---
      - name: Cache Rust binary
        uses: actions/cache@v4
        id: binary-cache
        with:
          path: backend/target/release/unified-api
          key: rust-binary-${{ runner.os }}-${{ hashFiles('backend/Cargo.toml', 'backend/src/**') }}
          restore-keys: rust-binary-${{ runner.os }}-

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-${{ hashFiles('.github/workflows/server.yml') }}
          restore-keys: ollama-models-

      - name: Cache cloudflared
        uses: actions/cache@v4
        id: cloudflared-cache
        with:
          path: ./cloudflared          # this stays in the root
          key: cloudflared-${{ runner.os }}-v1

      # --- Rust & build (inside backend/) ---
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build server (if cache miss)
        if: steps.binary-cache.outputs.cache-hit != 'true'
        run: |
          cd backend
          cargo build --release
          cp target/release/unified-api ./
        # This copies unified-api to backend/ for easy access

      # --- Ollama setup ---
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull models
        run: |
          ollama pull gemma3:1b
          ollama pull qwen3-embedding:0.6b

      # --- Start server, tunnel, update config, and write timestamp ---
      - name: Start services and write timestamp
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          set -e

          cd backend

          # Start the server
          chmod +x ./unified-api
          pkill -f unified-api 2>/dev/null || true
          ./unified-api &

          # Wait for health
          for i in {1..10}; do
            if curl -s http://localhost:8000/health | grep -q '"status":"ok"'; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -s http://localhost:8000/health | grep -q '"status":"ok"' || { echo "Server failed"; exit 1; }

          # Start Cloudflare tunnel (cloudflared binary is in root, so we need to reference it)
          if [ ! -f ../cloudflared ]; then
            curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ../cloudflared
            chmod +x ../cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ../cloudflared tunnel --protocol http2 --url http://localhost:8000 2>&1 | tee tunnel.log &

          # Get tunnel URL
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # Update config.js in chat repo (using TOKEN)
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG="const API_URL = \"${TUNNEL_URL}\";"
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.js")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"update API URL\",\"content\":\"${ENCODED}\",\"sha\":\"${SHA}\"}"
          else
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${CHAT_REPO}/contents/config.js" \
              -d "{\"message\":\"add API URL\",\"content\":\"${ENCODED}\"}"
          fi
          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # Go back to the root of the runner repo to commit the timestamp
          cd ..

          # Write timestamp to the runner repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date +%s)" > .server_start
          git add .server_start
          git commit -m "Update server start timestamp" || true
          git push origin HEAD:${{ github.ref }}

          # Keep the runner alive
          sleep infinity
