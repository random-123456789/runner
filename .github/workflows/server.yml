name: Exo Swarm (Tailscale)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "HuggingFace model ID"
        required: false
        default: "ibm-granite/granite-4.0-h-tiny"

permissions:
  actions: write
  contents: read

jobs:
  # ════════════════════════════════════════════════════════════
  #  COORDINATOR
  # ════════════════════════════════════════════════════════════
  coordinator:
    name: "🧠 Coordinator"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      tunnel_url: ${{ steps.tunnel.outputs.url }}

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/cache@v4
        id: cf_cache
        with:
          path: ./cloudflared
          key: cloudflared-v1

      - if: steps.cf_cache.outputs.cache-hit != 'true'
        run: |
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key ${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname exo-coordinator-${{ github.run_id }}
          sleep 5
          echo "✅ Tailscale connected"
          echo "📡 IP: $(tailscale ip -4)"

      - name: Setup Python and Exo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv venv
          source venv/bin/activate
          pip install --quiet exo

      - name: Start EXO coordinator
        env:
          EXO_LIBP2P_NAMESPACE: exo-swarm-${{ github.run_id }}
        run: |
          source venv/bin/activate

          echo "🔍 Verifying exo installation..."
          uv run exo --help > /dev/null 2>&1 && echo "✅ exo installed"

          echo "🚀 Starting exo coordinator (via uv run)..."
          nohup uv run exo > exo.log 2>&1 &
          EXO_PID=$!
          echo "📡 Exo PID: $EXO_PID"

          # Wait for exo to respond on port 52415
          for i in {1..30}; do
            if curl -s http://localhost:52415 > /dev/null 2>&1; then
              echo "✅ Exo is responding on port 52415"
              break
            fi
            echo "⏳ Waiting for exo... ($i/30)"
            sleep 2
          done

          if ! pgrep -f "uv run exo" > /dev/null; then
            echo "❌ Exo died! Showing logs:"
            cat exo.log
            exit 1
          fi

          echo "✅ Exo is running"
          echo "📋 Exo logs:"
          tail -20 exo.log

      - name: Start Cloudflare tunnel
        id: tunnel
        run: |
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          ./cloudflared tunnel --protocol http2 --url http://localhost:52415 2>&1 | tee tunnel.log &
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 2
          done
          echo "::notice::EXO Dashboard: ${TUNNEL_URL}"
          echo "url=${TUNNEL_URL}" >> "$GITHUB_OUTPUT"

      - name: Self-replication keepalive
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          START_TIME=$(date +%s)
          TRIGGER_AT=$((350 * 60))
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "⏰ Triggering replacement workflow..."
              curl -s -X POST -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/exo-swarm.yml/dispatches" \
                -d "{\"ref\":\"${{ github.ref }}\",\"inputs\":{\"model\":\"${{ github.event.inputs.model }}\"}}"
              TRIGGERED=true
            fi

            # Health checks
            pgrep -f "uv run exo" > /dev/null || (source venv/bin/activate && nohup uv run exo > exo.log 2>&1 &)
            pgrep -f cloudflared > /dev/null || ./cloudflared tunnel --protocol http2 --url http://localhost:52415 2>&1 | tee -a tunnel.log &
            sudo tailscale status > /dev/null || sudo tailscale up --auth-key ${{ secrets.TAILSCALE_AUTHKEY }} \
              --hostname exo-coordinator-${{ github.run_id }}

            sleep 30
          done


  # ════════════════════════════════════════════════════════════
  #  WORKERS (start in parallel)
  # ════════════════════════════════════════════════════════════
  worker:
    name: "⚙️ Worker ${{ matrix.worker_id }}"
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        worker_id: [1, 2, 3, 4, 5]

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --auth-key ${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname exo-worker-${{ matrix.worker_id }}-${{ github.run_id }}
          sleep 5
          echo "✅ Tailscale connected"
          echo "📡 IP: $(tailscale ip -4)"

      - name: Setup Python and Exo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv venv
          source venv/bin/activate
          pip install --quiet exo

      - name: Join EXO cluster
        env:
          EXO_LIBP2P_NAMESPACE: exo-swarm-${{ github.run_id }}
        run: |
          source venv/bin/activate

          echo "🔍 Verifying exo installation..."
          uv run exo --help > /dev/null 2>&1 && echo "✅ exo installed"

          echo "🚀 Starting exo worker (via uv run)..."
          nohup uv run exo > exo.log 2>&1 &
          EXO_PID=$!
          echo "📡 Exo PID: $EXO_PID"

          # Wait for exo to respond
          for i in {1..30}; do
            if curl -s http://localhost:52415 > /dev/null 2>&1; then
              echo "✅ Exo worker is responding on port 52415"
              break
            fi
            echo "⏳ Waiting for exo... ($i/30)"
            sleep 2
          done

          if ! pgrep -f "uv run exo" > /dev/null; then
            echo "❌ Exo died! Showing logs:"
            cat exo.log
            exit 1
          fi

          echo "✅ Worker ${{ matrix.worker_id }} joined cluster"
          echo "📋 Exo logs:"
          tail -20 exo.log

          # Keepalive loop
          while true; do
            if ! pgrep -f "uv run exo" > /dev/null; then
              nohup uv run exo > exo.log 2>&1 &
            fi
            if ! sudo tailscale status > /dev/null; then
              sudo tailscale up --auth-key ${{ secrets.TAILSCALE_AUTHKEY }} \
                --hostname exo-worker-${{ matrix.worker_id }}-${{ github.run_id }}
            fi
            sleep 30
          done
