name: Server

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # --- Ollama Cache ---
      - uses: actions/cache@v4
        id: ollama
        with:
          path: ~/.ollama/models
          key: ollama-distilled-tiny
          restore-keys: ollama-

      # --- Cloudflared Cache ---
      - uses: actions/cache@v4
        id: cloudflared
        with:
          path: ./cloudflared
          key: cloudflared
          restore-keys: cloudflared-

      # --- Setup Ollama ---
      - if: steps.ollama.outputs.cache-hit != 'true'
        uses: ai-action/setup-ollama@v2

      # --- Pull Custom Model (only if cache miss) ---
      - if: steps.ollama.outputs.cache-hit != 'true'
        run: ollama pull hf.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF:Q4_K_M

      # --- Save Ollama Cache (only if cache miss) ---
      - if: steps.ollama.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.ollama/models
          key: ollama-distilled-tiny

      # --- Download Cloudflared (only if cache miss) ---
      - if: steps.cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # --- Save Cloudflared Cache (only if cache miss) ---
      - if: steps.cloudflared.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ./cloudflared
          key: cloudflared

      # --- Run Ollama Server, Tunnel, and Self‑Replicate ---
      - name: Run and Replicate
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          # 1. Start Ollama server
          ollama serve &

          # 2. Wait for Ollama to be ready
          for i in {1..10}; do
            if curl -s http://localhost:11434/api/tags > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -s http://localhost:11434/api/tags > /dev/null || exit 1

          # 3. Ensure model is pulled (idempotent – does nothing if already present)
          ollama pull hf.co/glogwa68/granite-4.0-h-tiny-DISTILL-OPUS-4.5-think-GGUF:Q4_K_M

          # 4. Start Cloudflare tunnel (pointing to Ollama's port 11434)
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          pkill -f cloudflared 2>/dev/null || true
          ./cloudflared tunnel --protocol http2 --url http://localhost:11434 2>&1 | tee tunnel.log &

          # 5. Extract tunnel URL
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            [ -n "$TUNNEL_URL" ] && break
            sleep 1
          done
          echo "::notice::Tunnel URL: ${TUNNEL_URL}"

          # 6. Update config.json in the chat repo (so frontend redirects to the tunnel)
          CHAT_REPO="${{ github.repository_owner }}/chat"
          NEW_CONFIG=$(jq -n --arg url "$TUNNEL_URL" '{apiUrl: $url}')
          ENCODED=$(echo "$NEW_CONFIG" | base64 -w0)

          FILE_INFO=$(curl -s -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json")
          SHA=$(echo "$FILE_INFO" | jq -r '.sha')

          if [ "$SHA" != "null" ]; then
            PAYLOAD=$(jq -n \
              --arg msg "update API URL" \
              --arg content "$ENCODED" \
              --arg sha "$SHA" \
              --arg name "github-actions[bot]" \
              --arg email "github-actions[bot]@users.noreply.github.com" \
              '{message: $msg, content: $content, sha: $sha, author: {name: $name, email: $email}, committer: {name: $name, email: $email}}')
          else
            PAYLOAD=$(jq -n \
              --arg msg "add API URL" \
              --arg content "$ENCODED" \
              --arg name "github-actions[bot]" \
              --arg email "github-actions[bot]@users.noreply.github.com" \
              '{message: $msg, content: $content, author: {name: $name, email: $email}, committer: {name: $name, email: $email}}')
          fi

          curl -s -X PUT -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${CHAT_REPO}/contents/config.json" \
            -d "$PAYLOAD"

          echo "::notice::Frontend URL: https://${{ github.repository_owner }}.github.io/chat/"

          # 7. Self‑replication loop (trigger new run ~5 minutes before timeout)
          START_TIME=$(date +%s)
          TRIGGER_AT=$((350 * 60))
          TRIGGERED=false

          while true; do
            ELAPSED=$(( $(date +%s) - START_TIME ))

            if [ $ELAPSED -ge $TRIGGER_AT ] && [ "$TRIGGERED" = "false" ]; then
              echo "Triggering replacement workflow..."
              curl -X POST -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches" \
                -d '{"ref":"${{ github.ref }}"}'
              TRIGGERED=true
            fi

            # Health checks – restart if needed
            if ! curl -s http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama server down – restarting..."
              pkill -f ollama 2>/dev/null || true
              ollama serve &
            fi

            if ! pgrep -f cloudflared > /dev/null; then
              echo "Tunnel down – restarting..."
              ./cloudflared tunnel --protocol http2 --url http://localhost:11434 2>&1 | tee -a tunnel.log &
            fi

            sleep 30
          done
