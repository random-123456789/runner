name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119  # Default official native port for hermes dashboard

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Provision system binaries and download cloudflared
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl python3-pip python3-venv netcat-openbsd
          
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime engine
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Install the official Nous Research Hermes Agent package with Web extensions
      - name: Install Official Hermes Agent
        run: |
          python3 -m pip install --upgrade pip
          # Install the explicit web and pseudo-terminal dependencies for the dashboard layout
          pip install "hermes-agent[web,pty]"

      # 5. Pre-seed the official workspace configuration parameters
      - name: Pre-configure Hermes Runtime Environment
        run: |
          mkdir -p ~/.hermes
          
          # Write the official layout configuration file targeting your local Ollama engine
          cat << 'EOF' > ~/.hermes/config.yaml
          provider: "ollama"
          model: "granite4:tiny-h"
          providers:
            ollama:
              base_url: "http://127.0.0.1:11434"
          EOF
          
          echo "✅ Official config space pre-seeded successfully!"

      # 6. Launch the native Hermes Web Dashboard headless
      - name: Start Hermes Native Dashboard
        run: |
          # Use --no-open to prevent headless runner errors and bind to loopback interface
          nohup hermes dashboard --no-open --port ${{ env.HERMES_DASHBOARD_PORT }} > hermes_dashboard.log 2>&1 &
          
          echo "⏳ Waiting for official control plane to bind to port ${{ env.HERMES_DASHBOARD_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_DASHBOARD_PORT }}; then
              echo "✅ Official Hermes Dashboard is online and listening!"
              break
            fi
            sleep 3
          done

      # 7. Connect Cloudflare Tunnel straight to the native dashboard port (9119)
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          nohup ./cloudflared tunnel --url http://127.0.0.1:${{ env.HERMES_DASHBOARD_PORT }} --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              echo "Found address: $URL"
              break
            fi
            sleep 3
          done
          sleep 5

      # 8. Print accurate access route guidelines and maintain loop persistence
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          BASE_URL="${{ steps.tunnel.outputs.tunnel_url }}"
          
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${BASE_URL}"
          echo "================================================================="
          echo ""
          echo "--- DASHBOARD RUNTIME LOG SNAPSHOT ---"
          head -n 25 hermes_dashboard.log || true
          echo "================================================================="
          sleep infinity
