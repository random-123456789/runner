name: Queen (Hermes + Ollama) with Penelope Shell

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SHELL_PORT: 2222

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install Penelope and Holesail ----------
      - name: Install Penelope and Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nodejs npm python3
          sudo npm install -g holesail
          # Download Penelope
          wget -q -O /tmp/penelope.py https://raw.githubusercontent.com/brightio/penelope/refs/heads/main/penelope.py
          chmod +x /tmp/penelope.py

      # ---------- Start Ollama ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- Start Penelope server ----------
      - name: Start Penelope
        run: |
          # Run Penelope in the background, auto‑upgrade shells, listen on SHELL_PORT
          nohup python3 /tmp/penelope.py -p ${{ env.SHELL_PORT }} --auto > penelope.log 2>&1 &
          sleep 3
          # Verify it's listening
          netstat -tulpn | grep :${{ env.SHELL_PORT }} || { echo "❌ Penelope not listening"; exit 1; }

      # ---------- Start Hermes Dashboard (optional) ----------
      - name: Start Hermes Dashboard
        run: |
          export PATH="$HOME/.hermes/bin:$PATH"
          hermes dashboard --host 0.0.0.0 --port 18789 --no-open &
          sleep 10
          for i in {1..10}; do
            if curl -s http://localhost:18789/health > /dev/null; then
              echo "✅ Hermes Dashboard ready"
              break
            fi
            sleep 2
          done

      # ---------- Expose shell port via Holesail ----------
      - name: Expose Penelope with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.SHELL_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To get a FULL, LAG‑FREE interactive shell on the runner:"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Start the Holesail client (keep this terminal open):"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SHELL_PORT }}"
          echo ""
          echo "   3. In a NEW terminal, connect with:"
          echo "      nc localhost ${{ env.SHELL_PORT }}"
          echo ""
          echo "   That's it! Penelope will automatically give you a full PTY."
          echo ""
          echo "   Features:"
          echo "     - Arrow keys / history"
          echo "     - Ctrl+C (SIGINT), Ctrl+Z (job control)"
          echo "     - Tab completion"
          echo "     - Window resize support"
          echo "     - File transfers (download / upload)"
          echo "     - Session management (press F12 for menu)"
          echo ""
          echo "   After connecting, press F12 to return to Penelope's control menu."
          echo "   From there you can list sessions, download/upload files, etc."
          echo "================================================================="
          sleep infinity
