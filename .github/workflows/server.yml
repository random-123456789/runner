name: Queen (Hermes + Ollama) with Fully Interactive Shell (Socat)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  OLLAMA_MODEL: granite4:tiny-h
  SHELL_PORT: 2222

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # ---------- Setup Ollama ----------
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v1

      - name: Pull Ollama model
        run: ollama pull ${{ env.OLLAMA_MODEL }}

      # ---------- Install Hermes Agent ----------
      - name: Install Hermes Agent
        run: |
          curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash
          echo "$HOME/.hermes/bin" >> $GITHUB_PATH
          export PATH="$HOME/.hermes/bin:$PATH"

      # ---------- Install socat and Holesail ----------
      - name: Install socat and Holesail
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y socat nodejs npm
          sudo npm install -g holesail

      # ---------- Start Ollama service ----------
      - name: Start Ollama
        run: ollama serve &

      # ---------- Start fully interactive shell server ----------
      - name: Start interactive shell server
        run: |
          # This provides a full TTY – supports Ctrl+C, Ctrl+Z, tab completion, history, etc.
          socat TCP-LISTEN:${{ env.SHELL_PORT }},fork EXEC:'bash -li',pty,stderr,setsid,sigint,sane &
          sleep 2

      # ---------- Expose shell port via Holesail ----------
      - name: Expose shell with Holesail
        id: holesail
        run: |
          holesail --live ${{ env.SHELL_PORT }} --public > holesail.log 2>&1 &
          sleep 10
          CONNECTION_KEY=$(grep -oP 'hs://[a-zA-Z0-9]+' holesail.log | head -1)
          if [ -z "$CONNECTION_KEY" ]; then
            echo "❌ Failed to get Holesail key"
            cat holesail.log
            exit 1
          fi
          echo "connection_key=$CONNECTION_KEY" >> $GITHUB_OUTPUT

      # ---------- Print access instructions ----------
      - name: Print access
        env:
          CONNECTION_KEY: ${{ steps.holesail.outputs.connection_key }}
        run: |
          echo "================================================================="
          echo "🔑 Holesail Connection Key:"
          echo "   $CONNECTION_KEY"
          echo ""
          echo "🌐 To get a FULLY INTERACTIVE bash shell (with everything):"
          echo ""
          echo "   1. Install Holesail on your local machine:"
          echo "      npm install -g holesail"
          echo ""
          echo "   2. Install socat on your local machine (optional but recommended):"
          echo "      # Ubuntu/Debian: sudo apt-get install socat"
          echo "      # macOS: brew install socat"
          echo ""
          echo "   3. Start the Holesail client (keep this terminal open):"
          echo "      holesail \"$CONNECTION_KEY\" --port ${{ env.SHELL_PORT }}"
          echo ""
          echo "   4. In a NEW terminal, connect with one of these:"
          echo ""
          echo "      # Option A – using socat (best experience):"
          echo "      socat - TCP:localhost:${{ env.SHELL_PORT }}"
          echo ""
          echo "      # Option B – using netcat (works too):"
          echo "      nc localhost ${{ env.SHELL_PORT }}"
          echo ""
          echo "   That's it! You now have a full, interactive bash shell."
          echo "   Try: Ctrl+C, Ctrl+Z, tab completion, arrow keys, etc."
          echo ""
          echo "   5. Run Hermes:"
          echo "      hermes chat --model ${{ env.OLLAMA_MODEL }}"
          echo "================================================================="
          sleep infinity
