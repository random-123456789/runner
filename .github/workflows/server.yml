name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_LAUNCH_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Provision essential system tools and download cloudflared
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl netcat-openbsd
          
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      # 2. Setup Ollama runtime engine
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 3. Pull required weight files natively
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 4. Launch Hermes inside the unified Ollama context
      - name: Unified Ollama Hermes Launch
        run: |
          # Use the integrated app framework to serve the portal directly
          nohup ollama launch hermes \
            --model ${{ env.OLLAMA_MODEL }} \
            --port ${{ env.HERMES_LAUNCH_PORT }} > hermes_launch.log 2>&1 &
          
          echo "⏳ Waiting for unified portal to bind to port ${{ env.HERMES_LAUNCH_PORT }}..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.HERMES_LAUNCH_PORT }}; then
              echo "✅ Hermes Launcher is online!"
              break
            fi
            sleep 3
          done

      # 5. Map Cloudflare tunnel directly to the launch port
      - name: Start Cloudflare Tunnel Connection
        id: tunnel
        run: |
          # Clean tunnel passing straight to the wrapper engine
          nohup ./cloudflared tunnel \
            --url http://127.0.0.1:${{ env.HERMES_LAUNCH_PORT }} \
            --metrics 127.0.0.1:45455 > tunnel.log 2>&1 &
          
          echo "⏳ Catching TryCloudflare edge address registration..."
          for i in {1..20}; do
            URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$URL" ]; then 
              echo "tunnel_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 3
          done
          sleep 5

      # 6. Print access route and maintain keep-alive
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 OFFICIAL HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          sleep infinity
