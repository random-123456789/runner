name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  MAX_WORKERS: 19
  OLLAMA_MODEL: granite4:tiny-h
  HERMES_DASHBOARD_PORT: 9119

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      # 1. Start Ollama natively via the GitHub Action runner
      - name: Setup Ollama Engine
        uses: ai-action/setup-ollama@v2

      # 2. Pre-download weights so the agent has immediate access
      - name: Pull Ollama Model Weights
        run: |
          ollama pull ${{ env.OLLAMA_MODEL }}

      # 3. Build an isolated Docker bridging layer
      - name: Create Isolated Container Network
        run: |
          docker network create hermes-net

      # 4. Spin up the Hermes Agent dashboard inside a container wrapper
      - name: Launch Hermes Container
        run: |
          # We pass all security bypasses as environment variables and map the port
          docker run -d \
            --name hermes-dashboard \
            --network hermes-net \
            -p ${{ env.HERMES_DASHBOARD_PORT }}:${{ env.HERMES_DASHBOARD_PORT }} \
            -e HERMES_ALLOWED_ORIGINS="*" \
            -e HERMES_ALLOWED_HOSTS="*" \
            -e HERMES_DISABLE_CSRF="true" \
            -e HERMES_INSECURE="true" \
            -v ~/.hermes:/root/.hermes \
            python:3.11-slim /bin/bash -c "
              pip install --upgrade pip && \
              pip install 'hermes-agent[web,pty]' && \
              mkdir -p /root/.hermes && \
              echo 'provider: \"ollama\"' > /root/.hermes/config.yaml && \
              echo 'model: \"${{ env.OLLAMA_MODEL }}\"' >> /root/.hermes/config.yaml && \
              echo 'providers:' >> /root/.hermes/config.yaml && \
              echo '  ollama:' >> /root/.hermes/config.yaml && \
              echo '    base_url: \"http://host.docker.internal:11434\"' >> /root/.hermes/config.yaml && \
              hermes dashboard --host 0.0.0.0 --port ${{ env.HERMES_DASHBOARD_PORT }} --no-open --skip-build
            "

          echo "⏳ Waiting for containerized application boot sequence..."
          sleep 15
          docker logs hermes-dashboard

      # 5. Run Cloudflare Tunnel inside the same Docker network
      - name: Start Cloudflare Tunnel Container
        id: tunnel
        run: |
          # By putting cloudflared inside the same network, it can route directly 
          # to the 'hermes-dashboard' container alias, neutralizing host verification checks
          docker run -d \
            --name cloudflared-tunnel \
            --network hermes-net \
            cloudflare/cloudflared:latest \
            tunnel --no-autoupdate run --url http://hermes-dashboard:${{ env.HERMES_DASHBOARD_PORT }}

          echo "⏳ Catching ephemeral edge tunnel URL..."
          sleep 5
          
          # Extract the dynamic .trycloudflare link straight from the container logs
          URL=$(docker logs cloudflared-tunnel 2>&1 | grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' | head -1)
          echo "tunnel_url=$URL" >> $GITHUB_OUTPUT

      # 6. Output live entrypoint routes and enter hold state
      - name: Print Orchestration Access Route & Keep Alive
        run: |
          echo "================================================================="
          echo "🌐 CONTAINERIZED HERMES CONTROL PLANE PORTAL READY:"
          echo "👉 ${{ steps.tunnel.outputs.tunnel_url }}"
          echo "================================================================="
          sleep infinity
