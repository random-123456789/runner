name: Queen Orchestrator

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  QUEEN_MODEL: "bartowski/Llama-3.2-1B-Instruct-GGUF/resolve/main/Llama-3.2-1B-Instruct-Q4_K_M.gguf"
  PROXY_PORT: 8081

jobs:
  queen:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl git build-essential cmake python3 python3-pip nodejs npm
          sudo npm install -g holesail
          pip3 install fastapi uvicorn httpx pyyaml

      - name: Build llama.cpp with MCP support
        run: |
          git clone https://github.com/ggerganov/llama.cpp.git
          cd llama.cpp
          mkdir build && cd build
          cmake .. -DGGML_NATIVE=ON -DLLAMA_MCP=ON -DGGML_CUDA=OFF -DGGML_METAL=OFF
          cmake --build . --config Release -j4 --target llama-server
          cp bin/llama-server ../../
          cd ../..
          chmod +x llama-server
          # Show help (debug) – optional
          ./llama-server --help | head -30

      - name: Download model
        run: |
          curl -L -o model.gguf "https://huggingface.co/${{ env.QUEEN_MODEL }}" -f --retry 3

      - name: Generate system prompt from skills
        run: |
          BASE_PROMPT=$(cat prompts/default.md)
          SKILLS_LIST=""
          for skill in skills/*.yaml; do
            if [ -f "$skill" ]; then
              NAME=$(grep '^name:' "$skill" | head -1 | sed 's/name: //' | xargs)
              DESC=$(grep '^description:' "$skill" | head -1 | sed 's/description: //' | xargs)
              SKILLS_LIST="${SKILLS_LIST}\n- **$NAME**: $DESC"
            fi
          done
          echo "${BASE_PROMPT//\{\{skills_list\}\}/$SKILLS_LIST}" > system_prompt.txt

      - name: Start MCP proxy (from repo)
        run: |
          chmod +x mcp_proxy.py
          python3 mcp_proxy.py &
          sleep 10
          echo "✅ MCP proxy started on port ${{ env.PROXY_PORT }}"

      - name: Wait for initial workers to register
        run: |
          echo "Waiting for workers to register..."
          sleep 30

      - name: Start llama-server with proxy (no --api)
        env:
          MCP_ENDPOINTS: "http://localhost:${{ env.PROXY_PORT }}/mcp"
        run: |
          echo "🌐 Starting llama-server with MCP proxy: $MCP_ENDPOINTS"
          ./llama-server \
            -m model.gguf \
            -c 4096 \
            -ngl 0 \
            --host 0.0.0.0 \
            --port 8080 \
            --system-prompt "$(cat system_prompt.txt)" \
            --mcp "$MCP_ENDPOINTS" \
            &

          for i in {1..60}; do
            if curl -s http://localhost:8080/health > /dev/null; then
              echo "✅ Server ready"
              break
            fi
            sleep 2
          done
          if ! curl -s http://localhost:8080/health > /dev/null; then
            echo "❌ Server failed"
            exit 1
          fi

          # Cloudflare tunnel
          if [ ! -f ./cloudflared ]; then
            curl -Lo cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x cloudflared
          fi
          nohup ./cloudflared tunnel --protocol http2 --url http://localhost:8080 > tunnel.log 2>&1 &
          for i in {1..30}; do
            TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -1)
            if [ -n "$TUNNEL_URL" ]; then
              echo "✅ Tunnel URL: $TUNNEL_URL"
              break
            fi
            sleep 3
          done
          echo "::notice::Frontend URL: $TUNNEL_URL"
          sleep infinity
